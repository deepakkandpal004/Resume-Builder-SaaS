<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Resume Builder</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Stores the path in sessionStorage and redirects to index.html
      var path = window.location.pathname;
      var repo = '/AI-Resume-Builder';
      if (path.startsWith(repo)) {
        path = path.slice(repo.length) || '/';
      }
      sessionStorage.setItem('gh-pages-redirect', path + window.location.search);
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
