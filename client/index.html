  <meta name="description" content="Build ATS-friendly resumes with AI. Professional templates, real-time optimization, and instant sharing. Trusted by 50,000+ job seekers." />

  <script>
    // Apply theme before paint to avoid flash of incorrect theme
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) { }
    })();
  </script>
  <script>
    // GitHub Pages SPA redirect: restore path stored by 404.html
    (function () {
      var redirect = sessionStorage.getItem('gh-pages-redirect');
      if (redirect) {
        sessionStorage.removeItem('gh-pages-redirect');
        if (redirect !== '/') {
          window.history.replaceState(null, null, '/Resume-Builder-SaaS' + redirect);
        }
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
